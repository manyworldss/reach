<!-- @dsCard group="Patient mobile app" viewport="900x920" name="Patient app — return-to-work prototype" subtitle="Clinician-paired RTW flow: pair → daily check-in → work-task session → fit-for-duty progress. Tweaks for platform, nav, theme, text, plain language" -->
<!DOCTYPE html>
<html lang="en" class="reach-cursor">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reach · Patient app prototype</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="../../assets/interactions.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-ui); background:
      radial-gradient(120% 80% at 50% -10%, #1a2c27 0%, #0d1d19 46%, #081210 100%);
    display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #stage { position: relative; transform-origin: center center; display: flex; flex-direction: column; align-items: center; gap: 22px; }
  * { scrollbar-width: none; -ms-overflow-style: none; }
  *::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none; }
  .reach-rm *, .reach-rm *::before, .reach-rm *::after { animation: none !important; transition: none !important; }
  .stage-bar { display: flex; align-items: center; gap: 12px; }
  .restart-btn { display: inline-flex; align-items: center; gap: 8px; height: 42px; padding: 0 18px; border-radius: 999px; white-space: nowrap;
    border: 1px solid rgba(255,255,255,0.16); background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.86);
    font-family: var(--font-ui); font-size: 14px; font-weight: 600; cursor: pointer; backdrop-filter: blur(8px); }
  .restart-btn:hover { background: rgba(255,255,255,0.12); }
  .stage-cap { font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,0.45); }
  .stage-cap b { color: rgba(255,255,255,0.75); font-weight: 600; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="../clinician/icons.jsx?v=8"></script>
<script type="text/babel" src="proto/data.jsx?v=8"></script>
<script type="text/babel" src="proto/shell.jsx?v=8"></script>
<script type="text/babel" src="proto/screens-flow.jsx?v=8"></script>
<script type="text/babel" src="proto/screens-tabs.jsx?v=8"></script>
<script type="text/babel" src="proto/tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const ACCENTS = {
  teal:  { base: '#0c7d72', ink: '#0a544c', bright: '#20c4b0' },
  pine:  { base: '#0a6157', ink: '#074a42', bright: '#1aa597' },
  ocean: { base: '#2b6079', ink: '#1d4356', bright: '#4d95b8' },
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "platform": "ios",
  "nav": "floating",
  "accent": "pine",
  "textScale": 1,
  "playerTheme": "light",
  "playerLayout": "focus",
  "difficultyStyle": "pills",
  "todayLayout": "streak",
  "progressView": "ladder",
  "plainLanguage": false,
  "reducedMotion": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [phase, setPhase] = useState('splash');      // splash | pairing | app
  const [tab, setTab] = useState('today');
  const [overlay, setOverlay] = useState(null);       // null | 'checkin' | 'player' | 'reminders'
  const [doneCount, setDoneCount] = useState(0);
  const [checkinDone, setCheckinDone] = useState(false);
  const [unread, setUnread] = useState(2);

  const accent = ACCENTS[t.accent] || ACCENTS.teal;
  const sysRM = typeof matchMedia !== 'undefined' && matchMedia('(prefers-reduced-motion: reduce)').matches;
  const rm = t.reducedMotion || sysRM;
  const platform = t.platform;
  const playerDark = t.playerTheme === 'dark';

  // scale the device to fit the viewport
  const stageRef = useRef(null);
  useEffect(() => {
    const fit = () => {
      const el = stageRef.current; if (!el) return;
      const need = el.scrollHeight, needW = 420;
      const s = Math.min(1, (window.innerHeight - 36) / need, (window.innerWidth - 36) / needW);
      el.style.transform = `scale(${s})`;
    };
    fit();
    window.addEventListener('resize', fit);
    const id = setInterval(fit, 400);
    return () => { window.removeEventListener('resize', fit); clearInterval(id); };
  }, []);

  const startSession = () => { setTab('today'); setOverlay('player'); };
  const goCheckin = () => { setTab('today'); setOverlay('checkin'); };
  const finishCheckin = () => { setCheckinDone(true); setOverlay('player'); };       // check-in flows into the session
  const finishSession = () => { setDoneCount(window.ReachPatientData.TODAY.length); setOverlay(null); setTab('progress'); };
  const goReminders = () => { setUnread(0); setOverlay('reminders'); };
  const goEducation = () => { setOverlay('education'); };
  const reminderStart = () => { setOverlay(checkinDone ? 'player' : 'checkin'); };
  const restart = () => { setPhase('splash'); setTab('today'); setOverlay(null); setDoneCount(0); setCheckinDone(false); setUnread(2); };

  // ---- interior screen ----
  let interior, statusDark = false, gestureDark = false, colBg = 'var(--canvas)', fullBleed = false, showStatusInline = true;

  if (phase === 'splash') {
    fullBleed = true; statusDark = true; gestureDark = true;
    interior = <Splash onStart={() => setPhase('pairing')} />;
  } else if (phase === 'pairing') {
    colBg = 'var(--surface)';
    interior = <Pairing onPaired={() => setPhase('app')} />;
  } else if (overlay === 'checkin') {
    colBg = 'var(--surface)';
    interior = <div style={{ flex: 1, minHeight: 0 }}><CheckIn onDone={finishCheckin} onClose={() => setOverlay(null)} /></div>;
  } else if (overlay === 'player') {
    colBg = playerDark ? 'var(--ink-deep)' : 'var(--surface)';
    statusDark = playerDark; gestureDark = playerDark;
    interior = (
      <div style={{ flex: 1, minHeight: 0 }}>
        <Player startIdx={doneCount >= window.ReachPatientData.TODAY.length ? 0 : doneCount}
          onClose={() => setOverlay(null)} onComplete={finishSession}
          theme={t.playerTheme} difficultyStyle={t.difficultyStyle} layout={t.playerLayout} showClinical={!t.plainLanguage} />
      </div>
    );
  } else if (overlay === 'reminders') {
    colBg = 'var(--surface)';
    interior = <div style={{ flex: 1, minHeight: 0 }}><Reminders onStartSession={reminderStart} onClose={() => setOverlay(null)} /></div>;
  } else if (overlay === 'education') {
    colBg = 'var(--surface)';
    interior = <div style={{ flex: 1, minHeight: 0 }}><Education onClose={() => setOverlay(null)} /></div>;
  } else {
    // tab screens
    const body =
      tab === 'today' ? <Today onStart={startSession} onCheckin={goCheckin} onEducation={goEducation} layout={t.todayLayout} doneCount={doneCount} checkinDone={checkinDone} showClinical={!t.plainLanguage} /> :
      tab === 'progress' ? <Progress view={t.progressView} /> :
      tab === 'messages' ? <Messages /> :
      <Profile settings={{ textScale: t.textScale, reducedMotion: t.reducedMotion, playerTheme: t.playerTheme, plainLanguage: t.plainLanguage }}
        onSetting={(k, v) => setTweak(k, v)} onEducation={goEducation} />;
    const noScrollPad = tab === 'messages';
    interior = (
      <React.Fragment>
        <TopBar unread={unread} onBell={goReminders} />
        <div style={{ flex: 1, minHeight: 0, overflow: noScrollPad ? 'hidden' : 'auto', display: noScrollPad ? 'flex' : 'block', flexDirection: 'column' }}>{body}</div>
        {t.nav === 'floating'
          ? <FloatingNav tab={tab} onTab={setTab} platform={platform} />
          : <TabBar tab={tab} onTab={setTab} platform={platform} />}
      </React.Fragment>
    );
  }

  const frameInner = fullBleed ? (
    <React.Fragment>
      <div style={{ position: 'absolute', inset: 0 }}>{interior}</div>
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 30 }}><StatusBar platform={platform} dark={statusDark} /></div>
    </React.Fragment>
  ) : (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', background: colBg }}>
      <StatusBar platform={platform} dark={statusDark} />
      {interior}
    </div>
  );

  return (
    <ScaleCtx.Provider value={t.textScale}>
      <div id="stage" ref={stageRef}>
        <PhoneFrame platform={platform} accent={accent} rm={rm}>
          {frameInner}
          <NavGesture platform={platform} dark={gestureDark} />
        </PhoneFrame>

        <div className="stage-bar">
          <button className="restart-btn" onClick={restart}>
            <span style={{ display: 'inline-flex' }}>{(window.ReachIcons.arrowLeft)({ size: 16 })}</span> Restart demo
          </button>
          <span className="stage-cap"><b>{platform === 'ios' ? 'iOS' : 'Android'}</b> · {phase === 'app' ? (overlay || tab) : phase}</span>
        </div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Device" />
        <TweakRadio label="Platform" value={t.platform} options={[{value:'ios',label:'iOS'},{value:'android',label:'Android'}]} onChange={(v) => setTweak('platform', v)} />
        <TweakRadio label="Navigation" value={t.nav} options={[{value:'tabbar',label:'Tab bar'},{value:'floating',label:'Floating'}]} onChange={(v) => setTweak('nav', v)} />

        <TweakSection label="Theme" />
        <TweakColor label="Accent" value={accent.base}
          options={[ACCENTS.teal.base, ACCENTS.pine.base, ACCENTS.ocean.base]}
          onChange={(hex) => setTweak('accent', hex === ACCENTS.pine.base ? 'pine' : hex === ACCENTS.ocean.base ? 'ocean' : 'teal')} />
        <TweakRadio label="Session player" value={t.playerTheme} options={[{value:'light',label:'Light'},{value:'dark',label:'Dark'}]} onChange={(v) => setTweak('playerTheme', v)} />
        <TweakRadio label="Text size" value={String(t.textScale)} options={[{value:'1',label:'Default'},{value:'1.12',label:'Large'},{value:'1.26',label:'X-large'}]} onChange={(v) => setTweak('textScale', parseFloat(v))} />
        <TweakToggle label="Plain language" value={t.plainLanguage} onChange={(v) => setTweak('plainLanguage', v)} />
        <TweakToggle label="Reduced motion" value={t.reducedMotion} onChange={(v) => setTweak('reducedMotion', v)} />

        <TweakSection label="Layout variants" />
        <TweakRadio label="Today hero" value={t.todayLayout} options={[{value:'session',label:'Fit-for-duty'},{value:'streak',label:'Effort'}]} onChange={(v) => setTweak('todayLayout', v)} />
        <TweakRadio label="Progress" value={t.progressView} options={[{value:'trajectory',label:'Trend + signals'},{value:'ladder',label:'Plan focus'}]} onChange={(v) => setTweak('progressView', v)} />
        <TweakRadio label="Player layout" value={t.playerLayout} options={[{value:'standard',label:'Standard'},{value:'focus',label:'Focus'}]} onChange={(v) => setTweak('playerLayout', v)} />
        <TweakRadio label="Difficulty rating" value={t.difficultyStyle} options={[{value:'pills',label:'Pills'},{value:'scale',label:'Scale'},{value:'rows',label:'Rows'}]} onChange={(v) => setTweak('difficultyStyle', v)} />
      </TweaksPanel>
    </ScaleCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
